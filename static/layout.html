<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #grid {
      display: grid;
      width: 100%;
      height: 100%;
      gap: 4px;
      background: #111;
    }

    .tile {
      position: relative;
      background: #222;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tile video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
    }

    .avatar {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: #1a3a5c;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 72px;
      color: #4fc3f7;
      font-weight: 700;
      flex-shrink: 0;
    }

    .name-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      color: #fff;
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 0 2px 6px rgba(0,0,0,0.9);
      z-index: 1;
    }

    .name-label .role {
      display: block;
      font-size: 42px;
      color: #4fc3f7;
    }
  </style>
</head>
<body>
  <div id="grid"></div>

  <!-- Self-hosted livekit-client v2.19.0 — no external CDN dependency -->
  <script src="/static/livekit-client.umd.min.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const wsURL  = params.get('url');
    const token  = params.get('token') || params.get('access_token');
    const grid   = document.getElementById('grid');
    const tiles  = {};

    function setGridLayout(count) {
      const cols = count <= 1 ? 1 : count <= 2 ? 2 : count <= 4 ? 2 : 3;
      grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    }

    function addTile(participant) {
      if (tiles[participant.identity]) return;

      const tile = document.createElement('div');
      tile.className = 'tile';

      // Avatar placeholder — visible immediately even before video subscribes.
      // This ensures Chromium renders content so the recording pipeline starts.
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      const displayName = participant.name || participant.identity || '?';
      avatar.textContent = displayName[0].toUpperCase();

      const video = document.createElement('video');
      video.autoplay    = true;
      video.muted       = true;
      video.playsInline = true;

      const label = document.createElement('div');
      label.className = 'name-label';
      label.innerHTML = `<span class="role">${displayName}</span>`;

      tile.appendChild(avatar);
      tile.appendChild(video);
      tile.appendChild(label);
      grid.appendChild(tile);
      tiles[participant.identity] = { tile, video, avatar };
      setGridLayout(Object.keys(tiles).length);
      console.log('[layout] tile added:', participant.identity);
    }

    function removeTile(participant) {
      const entry = tiles[participant.identity];
      if (entry) {
        entry.tile.remove();
        delete tiles[participant.identity];
        setGridLayout(Object.keys(tiles).length);
      }
    }

    function attachTrack(participant, track) {
      if (track.kind !== 'video') return;
      if (!tiles[participant.identity]) addTile(participant);
      const entry = tiles[participant.identity];
      track.attach(entry.video);
      console.log('[layout] video attached:', participant.identity);
    }

    function detachTrack(participant, track) {
      if (track.kind !== 'video') return;
      const entry = tiles[participant.identity];
      if (entry) track.detach(entry.video);
    }

    // Seed a canvas-backed video stream into a hidden <video> element so
    // Chromium's media pipeline sees an active MediaStream immediately on load.
    // Without this, LiveKit's composite egress never fires EGRESS_ACTIVE because
    // it waits for at least one playing video source before starting the recording.
    function seedMediaPipeline() {
      const canvas  = document.createElement('canvas');
      canvas.width  = 2;
      canvas.height = 2;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, 2, 2);
      // Redraw every 100ms so the stream stays "live" (static canvas stalls)
      setInterval(() => { ctx.fillRect(0, 0, 2, 2); }, 100);
      const stream = canvas.captureStream(10);
      const seed   = document.createElement('video');
      seed.srcObject  = stream;
      seed.autoplay   = true;
      seed.muted      = true;
      seed.playsInline = true;
      seed.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0.01;pointer-events:none';
      document.body.appendChild(seed);
      seed.play().catch(() => {});
    }

    async function main() {
      if (!wsURL || !token) {
        document.title = 'ERROR: missing url/token';
        console.error('[layout] missing url or token — url=' + wsURL + ' token=' + (token ? 'ok' : 'MISSING'));
        return;
      }

      seedMediaPipeline();

      const room = new LivekitClient.Room({
        adaptiveStream: false,
        dynacast:       false,
      });

      room.on(LivekitClient.RoomEvent.ParticipantConnected,    addTile);
      room.on(LivekitClient.RoomEvent.ParticipantDisconnected, removeTile);
      room.on(LivekitClient.RoomEvent.TrackSubscribed, (track, _pub, participant) => {
        console.log('[layout] TrackSubscribed', track.kind, participant.identity);
        addTile(participant);
        attachTrack(participant, track);
      });
      room.on(LivekitClient.RoomEvent.TrackUnsubscribed, (track, _pub, participant) => {
        detachTrack(participant, track);
      });

      console.log('[layout] connecting to', wsURL);
      await room.connect(wsURL, token, { autoSubscribe: true });
      console.log('[layout] connected, remoteParticipants:', room.remoteParticipants.size);

      // Render participants already present when egress joins.
      // Wrapped in try-catch so a single error here does NOT kill the page
      // and destroy any tiles that were already rendered by the event handlers.
      try {
        room.remoteParticipants.forEach((p) => {
          console.log('[layout] existing participant:', p.identity);
          addTile(p);
          p.trackPublications.forEach((pub) => {
            if (pub.isSubscribed && pub.track) attachTrack(p, pub.track);
          });
        });
      } catch (err) {
        console.error('[layout] error initializing existing participants:', err);
      }
    }

    main().catch((err) => {
      // Log only — do NOT modify body/innerHTML here so any tiles already
      // rendered by event handlers are preserved for the recording pipeline.
      console.error('[layout] fatal error:', err);
      document.title = 'ERROR: ' + err.message;
    });
  </script>
</body>
</html>
